        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
            color: #E2E8F0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        #graph-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }

        #graph-container svg {
            touch-action: none;
        }

        .node-circle {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: stroke-width 0.2s, filter 0.2s;
        }

        .node-circle:hover {
            stroke-width: 3px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9));
        }

        .pulse-ring {
            fill: none;
            stroke-width: 1.5px;
            pointer-events: none;
            transform-box: fill-box;
            transform-origin: center;
            animation: ringPulse 2.2s ease-out infinite;
        }

        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 0.75; }
            100% { transform: scale(1.9); opacity: 0; }
        }

        .node-label {
            font-size: 11px;
            font-weight: 600;
            fill: #E2E8F0;
            pointer-events: none;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.9);
        }

        .focus-label {
            font-size: 14px;
            font-weight: 700;
        }

        .link {
            stroke-opacity: 0.3;
            transition: stroke-opacity 0.2s, stroke-width 0.2s;
            fill: none;
        }

        #tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.4);
            backdrop-filter: blur(10px);
            color: white;
            padding: 16px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            z-index: 50;
            max-width: 300px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.7);
        }

        #tt-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: #7DD3FC;
            margin-top: 8px;
            opacity: 0.85;
            word-break: break-word;
            border-top: 1px solid rgba(148,163,184,0.15);
            padding-top: 6px;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .ui-element {
            pointer-events: auto;
        }

        /* Breadcrumb */
        #breadcrumb-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 12px;
        }
        .crumb {
            padding: 3px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            color: #94A3B8;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            border: 1px solid transparent;
        }
        .crumb:hover {
            background: rgba(255,255,255,0.12);
            color: #F1F5F9;
        }
        .crumb.active {
            color: #0B0F19;
            font-weight: 700;
            background: #E2E8F0;
        }
        .crumb-sep {
            color: #475569;
            font-size: 10px;
        }

        #back-hint {
            font-size: 11px;
            color: #64748B;
            margin-top: 2px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 10px; }

        /* #ui-layer combines inset:0 with Tailwind's h-screen (100vh). The explicit
           height wins over inset-driven auto-height, so on mobile browsers where the
           address bar shrinks/grows the visible area, 100vh can exceed what's actually
           visible — pushing the bottom-anchored legend panel off-screen. dvh tracks the
           real visible viewport; it's identical to vh on desktop, so nothing changes there. */
        #ui-layer {
            height: 100vh;
            height: 100dvh;
        }

        /* ---- Mobile layout: the panels above were sized for desktop and were
           overflowing / clipping / eating most of the screen on phones. ---- */
        @media (max-width: 640px) {
            #ui-layer { padding: 10px; }

            #profile-card h1 { font-size: 15px; }
            #profile-card p.text-sm { font-size: 11px; line-height: 1.3; }
            #profile-card .flex.gap-3 { font-size: 9.5px; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
            #breadcrumb-bar { margin-top: 8px; padding-top: 8px; font-size: 10px; }
            #back-hint { font-size: 9.5px; }

            #zoom-controls { padding: 4px; gap: 2px; }
            #zoom-controls button { padding: 6px; }
            #zoom-controls button svg { width: 16px; height: 16px; }

            #legend-panel { width: 132px; padding: 8px 10px; margin-bottom: 8px; }
            #legend-panel h3 { font-size: 9.5px; margin-bottom: 6px; padding-bottom: 6px; }
            #legend-container { font-size: 10.5px; gap: 5px; }
            #legend-container > div { gap: 6px; }
            #legend-container > div > div { width: 8px; height: 8px; }
            #legend-hint { font-size: 8.5px; margin-top: 6px; }

            #tooltip { max-width: min(68vw, 230px); padding: 10px 12px; }
            #tt-title { font-size: 13px; }
            #tt-type { font-size: 10px; }
            #tt-desc { font-size: 11.5px; }
            #tt-meta { font-size: 9.5px; }
        }
    </style>

ctory": {"id": "Matrix_Factory", "desc": "Co-simulation digital twin of a PEM fuel-cell production line: a Python physics engine and a Java BDI cognitive layer, synchronized in real time over gRPC.", "meta": "", "children": [{"id": "Physical Engine Core", "desc": "Shared foundation for every physics model in the Python engine.", "meta": "", "children": [{"id": "Component (abstract base)", "desc": "Base lifecycle class every physics component in the engine implements.", "meta": "physical_engine/core/component.py"}, {"id": "GasConstants / StandardConditions", "desc": "Shared physical constants for gas behavior and standard conditions.", "meta": "physical_engine/core/constants.py"}, {"id": "TankState (enum)", "desc": "Discrete tank-state model shared across storage components.", "meta": "physical_engine/core/enums.py"}, {"id": "ComponentInitializationError", "desc": "Raised when a physics component fails to initialize from its config.", "meta": "physical_engine/core/exceptions.py"}]}, {"id": "PEM Fuel-Cell Electrochemistry", "desc": "The electrochemical heart of the twin: a Newton-Raphson solver over the full PEM fuel-cell voltage equation.", "meta": "", "children": [{"id": "calculate_nernst_potential", "desc": "Computes the thermodynamic Nernst potential for the fuel-cell reaction.", "meta": "physical_engine/factory_simulation/pemfc_model.py"}, {"id": "calculate_pemfc_voltage", "desc": "Full cell voltage from Nernst potential minus activation, ohmic, and concentration overpotentials.", "meta": "physical_engine/factory_simulation/pemfc_model.py"}, {"id": "newton_raphson_solver", "desc": "Iterative solver finding the operating current for a target voltage/load.", "meta": "physical_engine/factory_simulation/pemfc_model.py"}, {"id": "batch_polarization_sweep", "desc": "Numba-JIT-compiled parallel sweep across the full polarization curve.", "meta": "physical_engine/factory_simulation/pemfc_model.py"}, {"id": "StackThermalModel", "desc": "Thermal dynamics of the fuel-cell stack, validated against steady-state and decay behaviour tests.", "meta": "physical_engine/factory_simulation/stack_thermal_model.py"}, {"id": "StationParameters (stochastics)", "desc": "Stochastic station-level parameters feeding run-to-run variance.", "meta": "physical_engine/factory_simulation/station_stochastics.py"}]}, {"id": "Factory Hardware Models", "desc": "The rest of the physical production line surrounding the fuel-cell stack.", "meta": "", "children": [{"id": "CompressorStage", "desc": "Multi-stage compressor model for the hydrogen supply line.", "meta": "physical_engine/factory_simulation/compressor.py"}, {"id": "TankArray", "desc": "Hydrogen buffer-tank array feeding the test bench.", "meta": "physical_engine/factory_simulation/h2_tank.py"}]}, {"id": "Performance Layer", "desc": "Numba JIT compilation and lookup tables keep the physics engine fast enough for real-time co-simulation.", "meta": "", "children": [{"id": "LUTManager / LUTConfig", "desc": "Lookup-table cache shared with the h2_plant optimization layer's design.", "meta": "physical_engine/optimization/lut_manager.py"}, {"id": "numba_ops (+ pure-Python fallback)", "desc": "JIT-compiled numeric kernels with a pure-Python fallback path.", "meta": "physical_engine/optimization/numba_ops.py"}]}, {"id": "gRPC Co-Simulation Bridge", "desc": "The HLA-style real-time synchronization layer joining the Python physics engine to the Java agent world.", "meta": "", "children": [{"id": "SimBridgeServicer / SimBridgeStub", "desc": "gRPC service exposing simulation state and step control to the Java side.", "meta": "physical_engine/protos/sim_bridge_pb2_grpc.py"}, {"id": "sim_bridge_server.py", "desc": "Python-side gRPC server hosting the physics engine for remote stepping.", "meta": "physical_engine/sim_bridge_server.py"}, {"id": "GrpcClientBridge.java", "desc": "Java-side gRPC client driving the physics engine from the agent layer.", "meta": "src/main/java/factory/GrpcClientBridge.java"}, {"id": "ThermoStateIndex / ProtoIndex", "desc": "Index mapping between protobuf messages and internal thermodynamic state.", "meta": "physical_engine/proto_index.py"}]}, {"id": "BDI Cognitive Layer — Cartago Artifacts", "desc": "The Java/JaCaMo world model: each physical asset is exposed to Jason BDI agents as a Cartago artifact.", "meta": "", "children": [{"id": "AMRArtifact + STNode (Space-Time A*)", "desc": "Simulates the AMR fleet's physical position using cooperative, race-free space-time A* routing.", "meta": "src/main/java/factory/AMRArtifact.java"}, {"id": "BaseStationArtifact / TestBenchArtifact", "desc": "Artifacts for loading/unloading stations and the fuel-cell test bench.", "meta": "src/main/java/factory/BaseStationArtifact.java"}, {"id": "SupervisorArtifact / UtilitySystemArtifact", "desc": "High-level supervisory artifact and shared utility-system state.", "meta": "src/main/java/factory/SupervisorArtifact.java"}, {"id": "DatabaseArtifact / EnergyPriceArtifact", "desc": "Persistence and live energy-price feed exposed to agents.", "meta": "src/main/java/factory/DatabaseArtifact.java"}, {"id": "TimerArtifact", "desc": "Shared simulation-clock artifact agents synchronize against.", "meta": "src/main/java/factory/TimerArtifact.java"}]}, {"id": "Organizational Architecture — PROSA/ADACOR", "desc": "Two coexisting manufacturing-organization paradigms — heterarchical and hierarchical — that the factory can transition between live.", "meta": "", "children": [{"id": "prosa_org.xml", "desc": "Heterarchical PROSA organizational specification (holonic, peer-to-peer negotiation).", "meta": "src/org/prosa_org.xml"}, {"id": "adacor_org.xml", "desc": "Hierarchical ADACOR organizational specification (supervisor-coordinated).", "meta": "src/org/adacor_org.xml"}, {"id": "OrgSchemaTransition (two-phase commit)", "desc": "Transitions the whole factory between PROSA and ADACOR using a two-phase-commit protocol.", "meta": "src/main/java/factory/OrgSchemaTransition.java"}]}, {"id": "Telemetry & Security", "desc": "A live canvas dashboard fed over an authenticated WebSocket channel.", "meta": "", "children": [{"id": "TelemetryHub / TelemetryArtifact", "desc": "Aggregates and broadcasts live simulation telemetry.", "meta": "src/main/java/factory/TelemetryHub.java"}, {"id": "TelemetryWebSocketEndpoint", "desc": "WebSocket endpoint streaming telemetry frames to the dashboard.", "meta": "src/main/java/factory/TelemetryWebSocketEndpoint.java"}, {"id": "TicketAuthConfigurator / TicketIssuer", "desc": "HMAC-SHA256 short-lived ticket auth securing the WebSocket handshake.", "meta": "src/main/java/factory/TicketIssuer.java"}, {"id": "dashboard.js", "desc": "Canvas-based live telemetry dashboard front-end.", "meta": "visualization/dashboard.js"}]}, {"id": "Run Management & Reproducibility", "desc": "Generates the JaCaMo configuration for a run and manages its lifecycle end-to-end.", "meta": "", "children": [{"id": "RunManager", "desc": "Orchestrates a full simulation run from launch to teardown.", "meta": "src/main/java/factory/RunManager.java"}, {"id": "Phase4JcmGenerator / generate_factory_jcm.py", "desc": "Generates the .jcm JaCaMo configuration describing agents and artifacts.", "meta": "scripts/generate_factory_jcm.py"}, {"id": "daemon_launcher.py", "desc": "Launches and supervises the physics-engine daemon process.", "meta": "physical_engine/daemon_launcher.py"}]}, {"id": "Experiments — Monte Carlo Replication", "desc": "A statistical experiment harness comparing organizational paradigms under seeded, reproducible conditions.", "meta": "", "children": [{"id": "run_prosa_vs_adacor.py", "desc": "Runs matched Monte Carlo trials comparing PROSA vs. ADACOR factory performance.", "meta": "experiments/run_prosa_vs_adacor.py"}, {"id": "analyze_results.py", "desc": "Statistical analysis of the comparative experiment output.", "meta": "experiments/analyze_results.py"}, {"id": "SeededReplayTests.java", "desc": "JUnit replay tests enforcing the same seeding discipline as the Python side.", "meta": "src/test/java/factory/SeededReplayTests.java"}, {"id": "InvariantTests.java / SimulationTestHarness.java", "desc": "Invariant checks and an in-process JUnit harness for the full simulation.", "meta": "src/test/java/factory/InvariantTests.java"}]}]}, "UFSC": {"id": "UFSC", "desc": "Control and Automation Engineering, Federal University of Santa Catarina — expected graduation 2027. Graduate coursework completed as a non-degree special student in PPGEAS (2024-2026).", "meta": "", "children": [{"id": "Artificial Intelligence", "kind": "Graduate Course", "meta": "Prof. Jomi Fred Hübner · 2024/2", "desc": "Search & CSP, knowledge representation, expert systems, and fuzzy logic."}, {"id": "Concurrency & Real-Time Systems", "kind": "Graduate Course", "meta": "Prof. Carlos Barros Montez · 2024/2", "desc": "Concurrency (threads, race conditions, deadlock) and real-time scheduling (RM, DM, EDF) on POSIX/RTOS."}, {"id": "Renewable Energy Systems Modeling & Control", "kind": "Graduate Course", "meta": "Prof. Marcus V. A. da Costa Filho · 2024/2", "desc": "Solar, wind, biomass, and green-hydrogen systems; microgrids and optimal load dispatch."}, {"id": "Machine Learning", "kind": "Graduate Course", "meta": "Prof. Eric Aislan Antonelo · 2025/2", "desc": "Inductive learning, Bayesian networks, neural networks, reinforcement learning, and genetic algorithms."}, {"id": "Mobile Robotics", "kind": "Graduate Course", "meta": "Prof. Edson Roberto De Pieri · 2025/2", "desc": "Locomotion, sensing, kinematics, navigation, mapping, and cooperative robotics."}, {"id": "Linear Dynamic Systems", "kind": "Graduate Course", "meta": "Prof. Daniel Ferreira Coutinho · 2026/1", "desc": "State-space and transfer-function models, controllability/observability, LQR/LQG, and Kalman filtering."}]}};
const baseColors = {"Plot-in": "#22D3EE", "h2_plant": "#34D399", "Matrix_Factory": "#E879F9", "UFSC": "#A78BFA"};

        // ============================================================
        // STATE — single source of truth, all transitions funnel through navigate()
        // ============================================================
        const AppState = {
            mode: "home",        // "home" | "drill"
            drillPath: [],       // array of tree-node objects, root first
            rootKey: null        // e.g. "h2_plant"
        };

        let currentSim = null;
        let homeCenterForce = null;     // kept live so resize can retarget it without a rebuild
        let drillXForce = null;
        let drillYForce = null;
        let drillFocusNode = null;
        let drillChildNodes = null;

        // ============================================================
        // DOM / SVG SETUP (created once, never torn down)
        // ============================================================
        const tooltip = document.getElementById("tooltip");
        const container = document.getElementById("graph-container");
        let width = container.clientWidth;
        let height = container.clientHeight;

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [0, 0, width, height])
            .attr("style", "max-width: 100%; height: auto;");

        // Disable the built-in double-click-to-zoom so node dblclick can drive navigation instead
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => { g.attr("transform", event.transform); });
        svg.call(zoom).on("dblclick.zoom", null);

        const defs = svg.append("defs");
        const filter = defs.append("filter")
            .attr("id", "glow")
            .attr("x", "-20%").attr("y", "-20%")
            .attr("width", "140%").attr("height", "140%");
        filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "blur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        const g = svg.append("g");

        // Click on empty background = step back one level (ignored while at Home)
        svg.on("click", () => { if (AppState.mode === "drill") goBack(); });

        // ============================================================
        // HELPERS
        // ============================================================
        function shade(hex, t) {
            return d3.interpolateRgb(hex, "#ffffff")(t);
        }

        // Off-screen canvas used purely to measure label width so collision radii
        // can account for text, not just the circle — fixes label/edge overlap.
        const measureCanvas = document.createElement("canvas");
        const measureCtx = measureCanvas.getContext("2d");
        function textWidth(str, font) {
            measureCtx.font = font;
            return measureCtx.measureText(str).width;
        }

        function clearGraph() {
            if (currentSim) { currentSim.stop(); currentSim = null; }
            g.selectAll("*").remove();
            hideTooltip();
        }

        // ---- Tooltip, with hysteresis so it doesn't flip-flop right at a boundary ----
        let ttFlipX = false;
        let ttFlipY = false;
        const TT_OFFSET = 18;
        const TT_SLACK = 60;

        function positionTooltip(event) {
            const ttRect = tooltip.getBoundingClientRect();
            const w = ttRect.width;
            const h = ttRect.height;

            const rightEdge = event.pageX + TT_OFFSET + w;
            if (!ttFlipX && rightEdge > window.innerWidth) ttFlipX = true;
            else if (ttFlipX && rightEdge < window.innerWidth - TT_SLACK) ttFlipX = false;

            const bottomEdge = event.pageY + TT_OFFSET + h;
            if (!ttFlipY && bottomEdge > window.innerHeight) ttFlipY = true;
            else if (ttFlipY && bottomEdge < window.innerHeight - TT_SLACK) ttFlipY = false;

            const finalX = ttFlipX ? event.pageX - w - TT_OFFSET : event.pageX + TT_OFFSET;
            const finalY = ttFlipY ? event.pageY - h - TT_OFFSET : event.pageY + TT_OFFSET;
            tooltip.style.transform = `translate(${finalX}px, ${finalY}px)`;
        }

        function showTooltip(event, title, typeLabel, desc, meta, color) {
            document.getElementById("tt-title").innerText = title;
            document.getElementById("tt-title").style.color = color;
            document.getElementById("tt-type").innerText = typeLabel;
            document.getElementById("tt-desc").innerText = desc;
            const ttMeta = document.getElementById("tt-meta");
            if (meta && meta.length) {
                ttMeta.textContent = meta;
                ttMeta.classList.remove("hidden");
            } else {
                ttMeta.classList.add("hidden");
            }
            tooltip.style.opacity = 1;
            positionTooltip(event);
        }

        function hideTooltip() {
            tooltip.style.opacity = 0;
        }

        // ---- Drag (shared by home + drill simulations) ----
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                if (!event.subject.isFocus) {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }
            }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }

        // ---- Glow on demand only (hover / focus), not permanently on every node — perf fix ----
        function attachHoverGlow(circleSelection) {
            circleSelection
                .on("mouseover.glow", function() { d3.select(this).style("filter", "url(#glow)"); })
                .on("mouseout.glow", function(event, d) { if (!d.isFocus && !d.isIdentity) d3.select(this).style("filter", null); });
        }

        // ---- Touch/mobile-safe "explore" badge — a guaranteed single-tap target ----
        // (dblclick is unreliable on touch devices, so every expandable node also gets
        // this permanently-visible affordance rather than relying on a hover-only tooltip button.)
        function addExploreBadge(selection, onActivate) {
            const badge = selection.append("g")
                .attr("class", "explore-badge")
                .attr("transform", d => {
                    const r = d.radius !== undefined ? d.radius : d.r;
                    const off = r * 0.72;
                    return `translate(${off},${off})`;
                })
                .style("cursor", "pointer");

            // oversized invisible hit-area first, for a comfortable touch target
            badge.append("circle").attr("r", 15).attr("fill", "transparent");
            badge.append("circle")
                .attr("r", 10)
                .attr("fill", "#0B0F19")
                .attr("stroke", d => d.color)
                .attr("stroke-width", 1.5);
            badge.append("text")
                .attr("text-anchor", "middle")
                .attr("dy", "0.32em")
                .attr("font-size", "13px")
                .attr("font-weight", "700")
                .attr("fill", d => d.color)
                .text("+");

            badge.on("click", function(event, d) {
                event.stopPropagation();
                onActivate(d);
            });
            return badge;
        }

        // ============================================================
        // NAVIGATION — every transition goes through here (single state-mutation point)
        // ============================================================
        function navigate(nextMode, nextDrillPath, nextRootKey) {
            AppState.mode = nextMode;
            AppState.drillPath = nextDrillPath;
            AppState.rootKey = nextRootKey;
            if (nextMode === "home") renderHome(); else renderDrillLevel();
        }

        function enterDrill(rootKey) {
            navigate("drill", [drillTrees[rootKey]], rootKey);
        }
        function drillInto(childTreeNode) {
            navigate("drill", AppState.drillPath.concat([childTreeNode]), AppState.rootKey);
        }
        function goBack() {
            if (AppState.mode !== "drill") return;
            if (AppState.drillPath.length > 1) {
                navigate("drill", AppState.drillPath.slice(0, -1), AppState.rootKey);
            } else {
                navigate("home", [], null);
            }
        }
        function jumpToCrumb(index) {
            if (index < 0) { navigate("home", [], null); return; }
            navigate("drill", AppState.drillPath.slice(0, index + 1), AppState.rootKey);
        }

        // ============================================================
        // BREADCRUMB
        // ============================================================
        function updateBreadcrumb() {
            const bar = document.getElementById("breadcrumb-bar");
            bar.innerHTML = "";

            const homeCrumb = document.createElement("span");
            homeCrumb.className = `crumb${AppState.mode === "home" ? " active" : ""}`;
            homeCrumb.textContent = "\u2302 Home";
            homeCrumb.onclick = () => jumpToCrumb(-1);
            bar.appendChild(homeCrumb);

            AppState.drillPath.forEach((node, i) => {
                const sep = document.createElement("span");
                sep.className = "crumb-sep";
                sep.textContent = "\u203A";
                bar.appendChild(sep);

                const c = document.createElement("span");
                c.className = `crumb${i === AppState.drillPath.length - 1 ? " active" : ""}`;
                c.textContent = node.id;
                c.onclick = () => jumpToCrumb(i);
                bar.appendChild(c);
            });

            document.getElementById("back-hint").textContent = AppState.mode === "drill"
                ? "Tap \u2295 or double-click a node to go deeper \u00b7 tap background / \u2190 to go back"
                : "";

            const backBtn = document.getElementById("go-back");
            const atRoot = AppState.mode === "home";
            backBtn.classList.toggle("opacity-30", atRoot);
            backBtn.classList.toggle("pointer-events-none", atRoot);
            backBtn.setAttribute("aria-disabled", atRoot ? "true" : "false");
        }

        // ============================================================
        // LEGEND
        // ============================================================
        function renderLegendHome() {
            const items = [
                ["Identity", "#F8FAFC"], ["Category", "#64748B"],
                ["Domain Skill", "#F472B6"], ["Technology", "#FBBF24"],
                ["Experience", "#FB923C"], ["Education", "#A78BFA"],
                ["Plot-in", "#22D3EE"], ["h2_plant", "#34D399"], ["Matrix_Factory", "#E879F9"]
            ];
            document.getElementById("legend-container").innerHTML = items.map(([label, color]) => `
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full flex-shrink-0" style="background-color:${color}; box-shadow:0 0 10px ${color}"></div>
                    <span class="text-slate-200 font-medium text-xs">${label}</span>
                </div>`).join("");
            document.getElementById("legend-hint").textContent =
                "Hover a node for details. Tap \u2295 or double-click a project / UFSC to dive into its real architecture.";
        }

        function renderLegendDrill() {
            const base = baseColors[AppState.rootKey];
            const leafColor = shade(base, 0.6);
            document.getElementById("legend-container").innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full flex-shrink-0" style="background-color:${base}; box-shadow:0 0 10px ${base}"></div>
                    <span class="text-slate-200 font-medium text-xs">Current focus</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full flex-shrink-0" style="border:1.5px solid ${base}; opacity:0.85"></div>
                    <span class="text-slate-200 font-medium text-xs">Has more detail (tap \u2295)</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background-color:${leafColor}; box-shadow:0 0 8px ${leafColor}"></div>
                    <span class="text-slate-200 font-medium text-xs">Implementation detail</span>
                </div>`;
            document.getElementById("legend-hint").textContent =
                "Tap \u2295 or double-click a pulsing node to go deeper. Tap empty space, press \u2190, or use a breadcrumb to go back.";
        }

        function groupLabel(groupNum) {
            const labels = { 0: "Identity", 1: "Category", 2: "Project", 3: "History", 4: "Domain Skill", 5: "Technology" };
            return labels[groupNum] || "Node";
        }

        // ============================================================
        // HOME VIEW — full cross-linked galaxy
        // ============================================================
        function renderHome() {
            clearGraph();
            AppState.mode = "home";
            AppState.drillPath = [];
            AppState.rootKey = null;
            updateBreadcrumb();
            renderLegendHome();

            const nodesData = homeData.nodes;
            const linksData = homeData.links;

            const centerForce = d3.forceCenter(width / 2, height / 2);
            homeCenterForce = centerForce;

            const simulation = d3.forceSimulation(nodesData)
                .force("link", d3.forceLink(linksData).id(d => d.id).distance(d => 120 - d.value * 12))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", centerForce)
                .force("collide", d3.forceCollide().radius(d =>
                    d.radius + 10 + textWidth(d.id, "600 11px Inter, sans-serif") * 0.55
                ).iterations(2));
            currentSim = simulation;

            const link = g.append("g")
                .attr("stroke", "#475569")
                .selectAll("line")
                .data(linksData)
                .join("line")
                .attr("class", "link")
                .attr("stroke-width", d => Math.sqrt(d.value) * 1.5);

            const node = g.append("g")
                .selectAll("g")
                .data(nodesData)
                .join("g")
                .call(drag(simulation))
                .on("click", (event) => event.stopPropagation());

            node.filter(d => d.drillKey)
                .append("circle")
                .attr("class", "pulse-ring")
                .attr("r", d => d.radius + 8)
                .attr("stroke", d => d.color);

            const circles = node.append("circle")
                .attr("class", "node-circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.color);
            attachHoverGlow(circles);
            // Keep a permanent, cheap glow on the single identity node — the one place it's free
            node.filter(d => d.group === 0).select("circle.node-circle")
                .datum(d => Object.assign(d, { isIdentity: true }))
                .style("filter", "url(#glow)");

            node.append("text")
                .attr("class", "node-label")
                .attr("x", d => d.radius + 8)
                .attr("y", 4)
                .text(d => d.id);

            addExploreBadge(node.filter(d => d.drillKey), d => enterDrill(d.drillKey));

            const linkedByIndex = {};
            linksData.forEach(d => {
                linkedByIndex[`${d.source.id},${d.target.id}`] = 1;
                linkedByIndex[`${d.target.id},${d.source.id}`] = 1;
            });
            function isConnected(a, b) {
                return linkedByIndex[`${a.id},${b.id}`] || linkedByIndex[`${b.id},${a.id}`] || a.id === b.id;
            }

            node.on("mouseover", function(event, d) {
                node.transition().duration(200).style("opacity", o => isConnected(d, o) ? 1 : 0.05);
                link.transition().duration(200)
                    .style("stroke-opacity", o => (o.source === d || o.target === d ? 0.9 : 0))
                    .style("stroke", o => (o.source === d || o.target === d ? d.color : "#475569"));
                d3.select(this).select("circle.node-circle").transition().duration(200).attr("r", d.radius * 1.25);
                showTooltip(event, d.id, groupLabel(d.group), d.desc, d.meta, d.color);
            }).on("mousemove", (event) => positionTooltip(event))
              .on("mouseout", function(event, d) {
                node.transition().duration(300).style("opacity", 1);
                link.transition().duration(300).style("stroke-opacity", 0.3).style("stroke", "#475569");
                d3.select(this).select("circle.node-circle").transition().duration(300).attr("r", d.radius);
                hideTooltip();
            }).on("dblclick", function(event, d) {
                event.stopPropagation();
                if (d.drillKey) enterDrill(d.drillKey);
            });

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        // ============================================================
        // DRILL VIEW — radial single-level mind map
        // ============================================================
        function renderDrillLevel() {
            clearGraph();
            const focus = AppState.drillPath[AppState.drillPath.length - 1];
            const children = focus.children || [];
            updateBreadcrumb();
            renderLegendDrill();

            const cx = width / 2;
            const cy = height / 2;
            const depth = AppState.drillPath.length;
            const baseColor = baseColors[AppState.rootKey];
            const focusColor = shade(baseColor, Math.min(0.10 * (depth - 1), 0.5));
            const n = Math.max(children.length, 1);
            const R = children.length <= 6 ? Math.min(width, height) * 0.26 : Math.min(width, height) * 0.35;

            const focusNode = {
                id: focus.id, desc: focus.desc, meta: focus.meta || "",
                color: focusColor, r: 34, x: cx, y: cy, fx: cx, fy: cy,
                isFocus: true, hasChildren: true, treeRef: focus
            };

            const childNodes = children.map((c, i) => {
                const angle = -Math.PI / 2 + i * (2 * Math.PI / n);
                const hasKids = !!(c.children && c.children.length);
                const r = hasKids ? 19 : 13;
                const childColor = shade(baseColor, Math.min(0.14 * depth + (hasKids ? 0 : 0.20), 0.82));
                return {
                    id: c.id, desc: c.desc, meta: c.meta || "",
                    color: childColor, r, x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle),
                    angle, hasChildren: hasKids, treeRef: c
                };
            });

            drillFocusNode = focusNode;
            drillChildNodes = childNodes;

            const simNodes = [focusNode, ...childNodes];
            const simLinks = childNodes.map(cn => ({ source: focusNode, target: cn }));

            const xForce = d3.forceX(d => d.isFocus ? cx : d.x).strength(d => d.isFocus ? 1 : 0.12);
            const yForce = d3.forceY(d => d.isFocus ? cy : d.y).strength(d => d.isFocus ? 1 : 0.12);
            drillXForce = xForce;
            drillYForce = yForce;

            const simulation = d3.forceSimulation(simNodes)
                .force("link", d3.forceLink(simLinks).distance(d => d.source.r + d.target.r + 46).strength(0.5))
                .force("charge", d3.forceManyBody().strength(-90))
                .force("x", xForce)
                .force("y", yForce)
                .force("collide", d3.forceCollide(d => {
                    const font = d.isFocus ? "700 14px Inter, sans-serif" : "600 11px Inter, sans-serif";
                    return d.r + 14 + textWidth(d.id, font) * 0.6;
                }));
            currentSim = simulation;

            const link = g.append("g")
                .attr("stroke", baseColor)
                .attr("stroke-opacity", 0.35)
                .selectAll("line")
                .data(simLinks)
                .join("line")
                .attr("class", "link")
                .attr("stroke-width", 1.6);

            const node = g.append("g")
                .selectAll("g")
                .data(simNodes)
                .join("g")
                .call(drag(simulation))
                .on("click", (event) => event.stopPropagation());

            node.filter(d => d.hasChildren)
                .append("circle")
                .attr("class", "pulse-ring")
                .attr("r", d => d.r + 7)
                .attr("stroke", d => d.color);

            const circles = node.append("circle")
                .attr("class", "node-circle")
                .attr("r", d => d.r)
                .attr("fill", d => d.color);
            attachHoverGlow(circles);
            node.filter(d => d.isFocus).select("circle.node-circle").style("filter", "url(#glow)");

            node.append("text")
                .attr("class", d => d.isFocus ? "node-label focus-label" : "node-label")
                .attr("text-anchor", d => d.isFocus ? "middle" : (Math.cos(d.angle || 0) >= 0 ? "start" : "end"))
                .attr("x", d => d.isFocus ? 0 : (Math.cos(d.angle || 0) >= 0 ? d.r + 8 : -(d.r + 8)))
                .attr("y", d => d.isFocus ? d.r + 20 : 4)
                .text(d => d.id);

            addExploreBadge(node.filter(d => d.hasChildren && !d.isFocus), d => drillInto(d.treeRef));

            node.on("mouseover", function(event, d) {
                d3.select(this).select("circle.node-circle").transition().duration(150).attr("r", d.r * 1.15);
                const typeLabel = d.isFocus ? "Current Focus" : (d.treeRef.kind || (d.hasChildren ? "Tap \u2295 to explore \u203A" : "Implementation detail"));
                showTooltip(event, d.id, typeLabel, d.desc, d.meta, d.color);
            }).on("mousemove", (event) => positionTooltip(event))
              .on("mouseout", function(event, d) {
                d3.select(this).select("circle.node-circle").transition().duration(150).attr("r", d.r);
                hideTooltip();
            }).on("dblclick", function(event, d) {
                event.stopPropagation();
                if (d.isFocus) goBack();
                else if (d.hasChildren) drillInto(d.treeRef);
            });

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        // ============================================================
        // CONTROLS
        // ============================================================
        document.getElementById("zoom-in").addEventListener("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.3);
        });
        document.getElementById("zoom-out").addEventListener("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 0.7);
        });
        document.getElementById("reset-view").addEventListener("click", () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            if (currentSim) currentSim.alpha(0.4).restart();
        });
        document.getElementById("go-back").addEventListener("click", () => goBack());
        document.addEventListener("keydown", (e) => { if (e.key === "Escape") goBack(); });

        // ---- Non-destructive resize: retarget the existing simulation, never rebuild the DOM ----
        // This preserves the user's current pan/zoom and in-progress layout instead of wiping them.
        let resizeRaf = null;
        window.addEventListener("resize", () => {
            if (resizeRaf) cancelAnimationFrame(resizeRaf);
            resizeRaf = requestAnimationFrame(() => {
                width = container.clientWidth;
                height = container.clientHeight;
                svg.attr("width", width).attr("height", height).attr("viewBox", [0, 0, width, height]);

                if (AppState.mode === "home" && homeCenterForce) {
                    homeCenterForce.x(width / 2).y(height / 2);
                    if (currentSim) currentSim.alpha(0.3).restart();
                } else if (AppState.mode === "drill" && drillFocusNode) {
                    const cx = width / 2, cy = height / 2;
                    const R = drillChildNodes.length <= 6 ? Math.min(width, height) * 0.26 : Math.min(width, height) * 0.35;
                    drillFocusNode.fx = cx; drillFocusNode.fy = cy;
                    drillChildNodes.forEach(c => {
                        c.x = cx + R * Math.cos(c.angle);
                        c.y = cy + R * Math.sin(c.angle);
                    });
                    if (drillXForce) drillXForce.x(d => d.isFocus ? cx : d.x);
                    if (drillYForce) drillYForce.y(d => d.isFocus ? cy : d.y);
                    if (currentSim) currentSim.alpha(0.35).restart();
                }
            });
        });

        // ============================================================
        // INIT
        // ============================================================
        renderHome();
    </script>
</body>
</html>
